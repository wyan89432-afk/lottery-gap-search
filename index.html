<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gap Search Tool</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
color:#fff;
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:20px;
}

textarea{
width:100%;
height:220px;
background:#1e1e1e;
color:white;
border:1px solid #444;
padding:10px;
border-radius:10px;
resize:vertical;
}

.controls{
display:flex;
gap:10px;
margin-top:15px;
flex-wrap:wrap;
}

input{
padding:10px;
background:#1e1e1e;
color:white;
border:1px solid #444;
border-radius:8px;
width:120px;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.loadBtn{
background:#00c853;
color:white;
}

.searchBtn{
background:#2962ff;
color:white;
}

.resetBtn{
background:#d50000;
color:white;
}

#originalView{
margin-top:25px;
}

#resultView{
margin-top:25px;
}

.block{
background:#1a1a1a;
border:1px solid #333;
padding:15px;
margin-bottom:20px;
border-radius:12px;
}

.blockTitle{
font-size:18px;
font-weight:bold;
margin-bottom:10px;
color:#ffd600;
}

svg{
width:100%;
height:180px;
overflow:visible;
}

.hidden{
display:none;
}

.digit{
font-size:30px;
font-weight:bold;
fill:white;
}

.arrow-yellow{
stroke:yellow;
stroke-width:3;
fill:none;
}

.arrow-green{
stroke:#00ff00;
stroke-width:3;
fill:none;
}

.arrow-red{
stroke:red;
stroke-width:3;
fill:none;
}

.arrow-blue{
stroke:#00b0ff;
stroke-width:3;
fill:none;
}

</style>
</head>

<body>

<div class="container">

<h1>Gap Search Tool</h1>

<textarea id="excelData"
placeholder="Paste Excel Data Here"></textarea>

<div class="controls">

<button class="loadBtn"
onclick="loadData()">
Load
</button>

<input
id="gapInput"
placeholder="=5">

<button class="searchBtn"
onclick="runSearch()">
Search
</button>

<button class="resetBtn"
onclick="resetSearch()">
Reset
</button>

</div>

<div id="originalView"></div>

<div id="resultView"></div>

</div>

<script>

let rawNumbers = [];

const arrowColors = [
"arrow-yellow",
"arrow-green",
"arrow-red",
"arrow-blue"
];

function loadData(){

const text =
document
.getElementById("excelData")
.value
.trim();

if(!text) return;

rawNumbers =
text
.split(/\n+/)
.map(v=>v.trim())
.filter(v=>v);

renderOriginal();

}

function renderOriginal(){

const container =
document.getElementById(
"originalView"
);

container.innerHTML = "";

rawNumbers.forEach((num,index)=>{

const div =
document.createElement("div");

div.className="block";

div.innerHTML=
`<div class="blockTitle">Row ${index+1}</div>
 <div>${num}</div>`;

container.appendChild(div);

});

}

function getTargetIndex(startIndex, gap){

return startIndex + gap;

}

function getSharedDigits(a,b){

const setA =
new Set(a.split(""));

const setB =
new Set(b.split(""));

const shared = [];

setA.forEach(d=>{

if(setB.has(d)){
shared.push(d);
}

});

return shared;

}

function runSearch(){

const gapText =
document
.getElementById("gapInput")
.value
.trim();

if(!gapText){

renderOriginal();
document
.getElementById("resultView")
.innerHTML = "";

return;

}

const gap =
parseInt(
gapText.replace("=","")
);

if(
isNaN(gap) ||
gap < 1 ||
gap > 60
){
alert("Gap 1 - 60 only");
return;
}

searchGap(gap);

}

function searchGap(gap){

const resultView =
document.getElementById(
"resultView"
);

resultView.innerHTML = "";

document
.getElementById(
"originalView"
)
.innerHTML = "";

let colorCounter = 0;

for(
let i=0;
i<rawNumbers.length;
i++
){

const targetIndex =
getTargetIndex(
i,
gap
);

if(
targetIndex >=
rawNumbers.length
){
continue;
}

const top =
rawNumbers[i];

const bottom =
rawNumbers[targetIndex];

const shared =
getSharedDigits(
top,
bottom
);

if(
shared.length > 0
){

const color =
arrowColors[
colorCounter %
arrowColors.length
];

colorCounter++;

createBlock(
i,
targetIndex,
top,
bottom,
shared,
color,
gap
);

}

}

}

function resetSearch(){

document
.getElementById(
"gapInput"
)
.value = "";

document
.getElementById(
"resultView"
)
.innerHTML = "";

renderOriginal();

}

function getDigitPositions(count, startX, space){

const positions = [];
const totalWidth = (count - 1) * space;
const firstX = startX - totalWidth / 2;

for(let i=0;i<count;i++){
positions.push(firstX + (i * space));
}

return positions;

}

function createArrowSvg(top, bottom, shared, colorClass, gap, topIndex, bottomIndex){

const svgNS = "http://www.w3.org/2000/svg";
const svg = document.createElementNS(svgNS, "svg");
svg.setAttribute("viewBox", "0 0 420 180");

const defs = document.createElementNS(svgNS, "defs");
const marker = document.createElementNS(svgNS, "marker");
marker.setAttribute("id", `arrowhead-${topIndex}-${bottomIndex}-${Math.random().toString(36).slice(2,7)}`);
marker.setAttribute("markerWidth", "10");
marker.setAttribute("markerHeight", "10");
marker.setAttribute("refX", "8");
marker.setAttribute("refY", "3");
marker.setAttribute("orient", "auto");
marker.setAttribute("markerUnits", "strokeWidth");

const path = document.createElementNS(svgNS, "path");
path.setAttribute("d", "M0,0 L0,6 L9,3 z");
path.setAttribute("fill", "currentColor");

marker.appendChild(path);
defs.appendChild(marker);
svg.appendChild(defs);

const topDigits = top.split("");
const bottomDigits = bottom.split("");

const topX = getDigitPositions(topDigits.length, 210, 42);
const bottomX = getDigitPositions(bottomDigits.length, 210, 42);

const topY = 40;
const bottomY = 140;

topDigits.forEach((d,i)=>{

const t = document.createElementNS(svgNS, "text");
t.setAttribute("x", topX[i]);
t.setAttribute("y", topY);
t.setAttribute("text-anchor", "middle");
t.setAttribute("class", "digit");
t.textContent = d;
svg.appendChild(t);

});

bottomDigits.forEach((d,i)=>{

const t = document.createElementNS(svgNS, "text");
t.setAttribute("x", bottomX[i]);
t.setAttribute("y", bottomY);
t.setAttribute("text-anchor", "middle");
t.setAttribute("class", "digit");
t.textContent = d;
svg.appendChild(t);

});

let arrowCount = 0;

shared.forEach(digit=>{

const topMatches = [];
const bottomMatches = [];

topDigits.forEach((d,i)=>{
if(d === digit) topMatches.push(i);
});

bottomDigits.forEach((d,i)=>{
if(d === digit) bottomMatches.push(i);
});

topMatches.forEach(ti=>{
bottomMatches.forEach(bi=>{

const line = document.createElementNS(svgNS, "line");
line.setAttribute("x1", topX[ti]);
line.setAttribute("y1", topY + 8);
line.setAttribute("x2", bottomX[bi]);
line.setAttribute("y2", bottomY - 18);
line.setAttribute("class", colorClass);

const markerId = marker.getAttribute("id");
line.setAttribute("marker-end", `url(#${markerId})`);

svg.appendChild(line);
arrowCount++;

});
});

});

return svg;

}

function createBlock(i, targetIndex, top, bottom, shared, colorClass, gap){

const resultView =
document.getElementById("resultView");

const block =
document.createElement("div");

block.className = "block";

const title =
document.createElement("div");

title.className = "blockTitle";
title.textContent = `Match: Row ${i+1} → Row ${targetIndex+1}   |   Gap = ${gap}`;

const info =
document.createElement("div");
info.style.marginBottom = "10px";
info.textContent = `Shared digits: ${shared.join(", ")}`;

const svg = createArrowSvg(
top,
bottom,
shared,
colorClass,
gap,
i,
targetIndex
);

block.appendChild(title);
block.appendChild(info);
block.appendChild(svg);

resultView.appendChild(block);

}

document.addEventListener("keydown", function(e){
if(e.key === "Enter"){
const active = document.activeElement;
if(active && active.id === "gapInput"){
runSearch();
}
}
});
</script>
</body>
</html>
