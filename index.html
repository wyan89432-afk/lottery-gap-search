<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gap Search Tool (Table Version)</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --surface-color: #1a1a1a;
            --border-color: #333;
            --text-color: #eee;
            --accent-yellow: #ffeb3b;
            --accent-green: #4caf50;
            --accent-red: #f44336;
            --accent-blue: #2196f3;
            --header-bg: #252525;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 10px;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 15px;
            color: var(--accent-yellow);
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .input-section {
            background: var(--surface-color);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: #000;
            color: #0f0;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 10px;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        input[type="text"] {
            padding: 8px;
            background: #000;
            color: #fff;
            border: 1px solid #555;
            border-radius: 4px;
            width: 80px;
            text-align: center;
        }

        button {
            padding: 8px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            text-transform: uppercase;
        }

        .btn-load { background-color: var(--accent-green); color: #000; }
        .btn-search { background-color: var(--accent-blue); color: #fff; }
        .btn-reset { background-color: var(--accent-red); color: #fff; }

        /* Table Styles */
        .table-wrapper {
            overflow-x: auto;
            margin-top: 10px;
            background: var(--surface-color);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        table {
            border-collapse: collapse;
            margin: 0 auto;
        }

        td, th {
            border: 1px solid #333;
            padding: 5px 10px;
            text-align: center;
            font-size: 14px;
        }

        th {
            background: var(--header-bg);
            color: #888;
            font-size: 10px;
        }

        .row-num {
            color: #555;
            font-size: 10px;
            background: #111;
        }

        /* Result Blocks */
        .result-container {
            margin-top: 20px;
        }

        .match-block {
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            margin-bottom: 20px;
            padding: 15px;
            position: relative;
            overflow: visible;
        }

        .match-label {
            font-size: 11px;
            color: #777;
            margin-bottom: 10px;
            border-bottom: 1px solid #222;
            padding-bottom: 5px;
        }

        .svg-box {
            width: 100%;
            height: 120px;
            overflow: visible;
        }

        .digit-text {
            font-size: 28px;
            font-weight: bold;
            fill: #fff;
            text-anchor: middle;
            dominant-baseline: middle;
        }

        .arrow-line {
            stroke-width: 2.5;
            fill: none;
        }

        .arrow-yellow { stroke: var(--accent-yellow); }
        .arrow-green { stroke: var(--accent-green); }
        .arrow-red { stroke: var(--accent-red); }
        .arrow-blue { stroke: var(--accent-blue); }

        @media (max-width: 600px) {
            .controls { flex-direction: row; justify-content: space-between; }
            button { flex: 1; padding: 10px 5px; }
            input[type="text"] { width: 60px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Gap Search Tool</h1>

    <div class="input-section">
        <textarea id="excelInput" placeholder="Paste Excel Data Here..."></textarea>
        <div class="controls">
            <input type="text" id="gapInput" placeholder="=1" value="=1">
            <button class="btn-load" onclick="handleLoad()">Load</button>
            <button class="btn-search" onclick="handleSearch()">Search</button>
            <button class="btn-reset" onclick="handleReset()">Reset</button>
        </div>
    </div>

    <div id="tableArea" class="table-wrapper"></div>
    <div id="resultArea" class="result-container"></div>
</div>

<script>
    let rawData = [];
    const COLORS = ['arrow-yellow', 'arrow-green', 'arrow-red', 'arrow-blue'];

    function handleLoad() {
        const text = document.getElementById('excelInput').value.trim();
        if (!text) return;

        rawData = text.split(/[\n\t\r]+/).map(v => v.trim()).filter(v => v !== "");
        renderTable();
        document.getElementById('resultArea').innerHTML = "";
    }

    function renderTable() {
        const tableArea = document.getElementById('tableArea');
        tableArea.innerHTML = "";
        
        if (rawData.length === 0) return;

        const table = document.createElement('table');
        const rowsPerCol = 24;
        const numCols = Math.ceil(rawData.length / rowsPerCol);

        // Create header
        const headerRow = document.createElement('tr');
        headerRow.innerHTML = '<th>#</th>';
        for (let c = 0; c < numCols; c++) {
            headerRow.innerHTML += `<th>Col ${c + 1}</th>`;
        }
        table.appendChild(headerRow);

        // Create 24 rows
        for (let r = 0; r < rowsPerCol; r++) {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td class="row-num">${r + 1}</td>`;
            
            for (let c = 0; c < numCols; c++) {
                const idx = c * rowsPerCol + r;
                const val = rawData[idx] || "";
                tr.innerHTML += `<td>${val}</td>`;
            }
            table.appendChild(tr);
        }
        
        tableArea.appendChild(table);
    }

    function handleReset() {
        document.getElementById('excelInput').value = "";
        document.getElementById('gapInput').value = "=1";
        rawData = [];
        document.getElementById('tableArea').innerHTML = "";
        document.getElementById('resultArea').innerHTML = "";
    }

    function getSharedDigits(a, b) {
        const setA = new Set(a.toString().split(''));
        const setB = new Set(b.toString().split(''));
        const shared = [];
        setA.forEach(digit => {
            if (setB.has(digit)) shared.push(digit);
        });
        return shared;
    }

    function handleSearch() {
        const gapValue = document.getElementById('gapInput').value.trim();
        const gapMatch = gapValue.match(/^=(\d+)$/);
        
        if (!gapMatch) {
            alert("Format: =1 to =60");
            return;
        }
        
        const gap = parseInt(gapMatch[1]);
        if (gap < 1 || gap > 60) return;

        if (rawData.length === 0) handleLoad();
        if (rawData.length === 0) return;

        // Hide main table during search
        document.getElementById('tableArea').classList.add('hidden');
        const resultArea = document.getElementById('resultArea');
        resultArea.innerHTML = "";

        let colorIdx = 0;

        for (let i = 0; i < rawData.length; i++) {
            const targetIdx = i + gap;
            if (targetIdx >= rawData.length) break;

            const val1 = rawData[i];
            const val2 = rawData[targetIdx];
            const shared = getSharedDigits(val1, val2);

            if (shared.length > 0) {
                const colorClass = COLORS[colorIdx % COLORS.length];
                colorIdx++;
                addMatchResult(i, targetIdx, val1, val2, shared, colorClass, gap);
            }
        }

        if (resultArea.innerHTML === "") {
            resultArea.innerHTML = "<div style='text-align:center; color:#555;'>No Matches</div>";
        }
    }

    function addMatchResult(idx1, idx2, val1, val2, shared, colorClass, gap) {
        const resultArea = document.getElementById('resultArea');
        const block = document.createElement('div');
        block.className = 'match-block';

        const r1 = (idx1 % 24) + 1;
        const c1 = Math.floor(idx1 / 24) + 1;
        const r2 = (idx2 % 24) + 1;
        const c2 = Math.floor(idx2 / 24) + 1;

        block.innerHTML = `
            <div class="match-label">
                Col ${c1} Row ${r1} (${val1}) → Col ${c2} Row ${r2} (${val2}) | GAP = ${gap}
            </div>
            <div class="svg-box"></div>
        `;

        const svgBox = block.querySelector('.svg-box');
        const drawArrows = gap <= 10;
        svgBox.appendChild(createSVG(val1, val2, shared, colorClass, drawArrows, idx1, idx2));
        
        resultArea.appendChild(block);
    }

    function createSVG(val1, val2, shared, colorClass, drawArrows, id1, id2) {
        const svgNS = "http://www.w3.org/2000/svg";
        const svg = document.createElementNS(svgNS, "svg");
        svg.setAttribute("viewBox", "0 0 300 120");

        const s1 = val1.toString();
        const s2 = val2.toString();

        const getX = (idx, total) => {
            const spacing = 40;
            return 150 - ((total - 1) * spacing) / 2 + idx * spacing;
        };

        // Top Digits
        s1.split('').forEach((d, i) => {
            const t = document.createElementNS(svgNS, "text");
            t.setAttribute("x", getX(i, s1.length));
            t.setAttribute("y", 25);
            t.setAttribute("class", "digit-text");
            t.textContent = d;
            svg.appendChild(t);
        });

        // Bottom Digits
        s2.split('').forEach((d, i) => {
            const t = document.createElementNS(svgNS, "text");
            t.setAttribute("x", getX(i, s2.length));
            t.setAttribute("y", 95);
            t.setAttribute("class", "digit-text");
            t.textContent = d;
            svg.appendChild(t);
        });

        if (drawArrows) {
            const markerId = `arr-${id1}-${id2}`;
            const defs = document.createElementNS(svgNS, "defs");
            defs.innerHTML = `
                <marker id="${markerId}" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                    <polygon points="0 0, 10 3.5, 0 7" fill="currentColor" />
                </marker>
            `;
            svg.appendChild(defs);

            shared.forEach(digit => {
                const tops = [];
                const bots = [];
                for (let i = 0; i < s1.length; i++) if (s1[i] === digit) tops.push(i);
                for (let i = 0; i < s2.length; i++) if (s2[i] === digit) bots.push(i);

                tops.forEach(ti => {
                    bots.forEach(bi => {
                        const line = document.createElementNS(svgNS, "line");
                        line.setAttribute("x1", getX(ti, s1.length));
                        line.setAttribute("y1", 40);
                        line.setAttribute("x2", getX(bi, s2.length));
                        line.setAttribute("y2", 75);
                        line.setAttribute("class", "arrow-line " + colorClass);
                        line.setAttribute("marker-end", `url(#${markerId})`);
                        line.style.color = getComputedStyle(document.documentElement).getPropertyValue('--accent-' + colorClass.split('-')[1]);
                        svg.appendChild(line);
                    });
                });
            });
        }

        return svg;
    }

    document.getElementById('gapInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleSearch();
    });
</script>

</body>
</html>
