<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gap Search Tool</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
color:#fff;
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:20px;
}

textarea{
width:100%;
height:220px;
background:#1e1e1e;
color:white;
border:1px solid #444;
padding:10px;
border-radius:10px;
resize:vertical;
}

.controls{
display:flex;
gap:10px;
margin-top:15px;
flex-wrap:wrap;
}

input{
padding:10px;
background:#1e1e1e;
color:white;
border:1px solid #444;
border-radius:8px;
width:120px;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.loadBtn{
background:#00c853;
color:white;
}

.searchBtn{
background:#2962ff;
color:white;
}

.resetBtn{
background:#d50000;
color:white;
}

#originalView{
margin-top:25px;
}

#resultView{
margin-top:25px;
}

.block{
background:#1a1a1a;
border:1px solid #333;
padding:15px;
margin-bottom:20px;
border-radius:12px;
}

.blockTitle{
font-size:18px;
font-weight:bold;
margin-bottom:10px;
color:#ffd600;
}

svg{
width:100%;
height:180px;
overflow:visible;
}

.hidden{
display:none;
}

.digit{
font-size:30px;
font-weight:bold;
fill:white;
}

.arrow-yellow{
stroke:yellow;
stroke-width:3;
fill:none;
}

.arrow-green{
stroke:#00ff00;
stroke-width:3;
fill:none;
}

.arrow-red{
stroke:red;
stroke-width:3;
fill:none;
}

.arrow-blue{
stroke:#00b0ff;
stroke-width:3;
fill:none;
}

</style>
</head>

<body>

<div class="container">

<h1>Gap Search Tool</h1>

<textarea id="excelData"
placeholder="Paste Excel Data Here"></textarea>

<div class="controls">

<button class="loadBtn"
onclick="loadData()">
Load
</button>

<input
id="gapInput"
placeholder="=5">

<button class="searchBtn"
onclick="runSearch()">
Search
</button>

<button class="resetBtn"
onclick="resetSearch()">
Reset
</button>

</div>

<div id="originalView"></div>

<div id="resultView"></div>

</div>

<script>

let rawNumbers = [];

const arrowColors = [
"arrow-yellow",
"arrow-green",
"arrow-red",
"arrow-blue"
];

function loadData(){

const text =
document
.getElementById("excelData")
.value
.trim();

if(!text) return;

rawNumbers =
text
.split(/\n+/)
.map(v=>v.trim())
.filter(v=>v);

renderOriginal();

}

function renderOriginal(){

const container =
document.getElementById(
"originalView"
);

container.innerHTML = "";

rawNumbers.forEach((num,index)=>{

const div =
document.createElement("div");

div.className="block";

div.innerHTML=
`Row ${index+1}
 : ${num}`;

container.appendChild(div);

});

}
</script>
</body>
</html>
