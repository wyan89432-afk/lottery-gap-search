<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAP SEARCH TOOL (1-60)</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b0e14">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GapSearch">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        :root {
            --bg-color: #0b0e14;
            --surface-color: #151921;
            --border-color: #2d343f;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --accent-yellow: #fbbf24;
            --accent-green: #22c55e;
            --accent-red: #ef4444;
            --accent-blue: #3b82f6;
            --primary-color: #3b82f6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 15px;
            line-height: 1.6;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: var(--text-dim);
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .input-section {
            background: var(--surface-color);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        textarea {
            width: 100%;
            height: 180px;
            background: #000;
            color: #fff;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            resize: vertical;
            margin-bottom: 15px;
            font-size: 14px;
            outline: none;
        }

        textarea:focus {
            border-color: var(--primary-color);
        }

        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .gap-input-wrapper {
            display: flex;
            align-items: center;
            background: #000;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding-left: 12px;
            flex: 1;
            min-width: 150px;
        }

        .gap-input-wrapper label {
            color: var(--text-dim);
            font-size: 14px;
            font-weight: bold;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            background: transparent;
            color: #fff;
            border: none;
            outline: none;
            font-weight: bold;
        }

        button {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 0.5px;
        }

        button:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-load { background-color: var(--accent-green); color: #000; }
        .btn-search { background-color: var(--primary-color); color: #fff; }
        .btn-reset { background-color: var(--accent-red); color: #fff; }

        #displayArea {
            margin-top: 20px;
        }

        .results-section {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .results-header {
            font-size: 14px;
            color: var(--text-dim);
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }

        .match-count {
            color: var(--accent-yellow);
            font-weight: bold;
            background: rgba(251, 191, 36, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .table-wrapper {
            overflow: auto;
            max-height: 700px;
            position: relative;
        }

        .table-inner {
            position: relative;
            display: inline-block;
            transform-origin: top left;
            transition: transform 0.2s ease;
        }

        table {
            border-collapse: collapse;
            font-size: 13px;
            white-space: nowrap;
            font-family: 'JetBrains Mono', monospace;
        }

        th, td {
            border: 1px solid var(--border-color);
            padding: 6px 10px;
            text-align: center;
            min-width: 50px;
        }

        th {
            background: #1e293b;
            color: var(--accent-blue);
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        td {
            background: #0f172a;
            color: #fff;
        }

        td.highlight-a {
            background: rgba(251, 191, 36, 0.25) !important;
            color: var(--accent-yellow) !important;
            font-weight: bold;
            border: 2px solid var(--accent-yellow);
        }

        td.highlight-b {
            background: rgba(34, 197, 94, 0.25) !important;
            color: var(--accent-green) !important;
            font-weight: bold;
            border: 2px solid var(--accent-green);
        }

        .row-num {
            background: #1e293b !important;
            color: var(--text-dim) !important;
            font-weight: bold;
            min-width: 40px;
        }

        .svg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 15;
        }

        .zoom-controls {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
        }

        .zoom-controls button {
            padding: 5px 12px;
            background: #1e293b;
            color: var(--accent-blue);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 14px;
        }

        .no-results {
            text-align: center;
            color: var(--text-dim);
            padding: 40px;
        }

        .help-text {
            color: var(--text-dim);
            font-size: 12px;
            margin-top: 10px;
        }

        @media (max-width: 600px) {
            .controls { flex-direction: column; align-items: stretch; }
            button { width: 100%; }
            .gap-input-wrapper { width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>LOTTERY PATTERN ANALYZER</h1>

    <div class="input-section">
        <textarea id="excelInput" placeholder="Paste Excel Data Here (One 3-digit number per line or tab-separated)..."></textarea>
        <div class="controls">
            <div class="gap-input-wrapper">
                <label>GAP</label>
                <input type="text" id="gapInput" placeholder="=1" value="=1">
            </div>
            <button class="btn-load" onclick="handleLoad()">Load Data</button>
            <button class="btn-search" onclick="handleSearch()">Search Patterns</button>
            <button class="btn-reset" onclick="handleReset()">Reset</button>
        </div>
        <div class="help-text">
            Paste 3-digit numbers (one per line). Gap 1-60. Searches shared digits between row pairs and shows results in a table with curved arrows.
        </div>
    </div>

    <div id="displayArea"></div>
</div>

<script>
    let rawData = [];
    let zoomLevel = 1;
    const ARROW_COLORS = ['#fbbf24', '#22c55e', '#ef4444', '#3b82f6', '#a855f7', '#f97316', '#06b6d4', '#ec4899'];

    function handleLoad() {
        const text = document.getElementById('excelInput').value.trim();
        if (!text) {
            alert("Please paste some data first.");
            return;
        }
        // Parse data: handles newlines, tabs, and multiple spaces
        rawData = text.split(/[\n\t\r]+/).map(v => v.trim()).filter(v => v !== "");
        // Pad to 3 digits
        rawData = rawData.map(v => {
            const n = parseInt(v);
            if (isNaN(n)) return v;
            return String(n).padStart(3, '0');
        });
        renderTable();
    }

    function renderTable() {
        const displayArea = document.getElementById('displayArea');
        displayArea.innerHTML = "";
        if (rawData.length === 0) return;

        const section = document.createElement('div');
        section.className = 'results-section';

        const header = document.createElement('div');
        header.className = 'results-header';
        header.innerHTML = `<span>Loaded Data (Table View)</span><span>${rawData.length} Rows</span>`;
        section.appendChild(header);

        // Build table: single column with row numbers
        const wrapper = document.createElement('div');
        wrapper.className = 'table-wrapper';
        const inner = document.createElement('div');
        inner.className = 'table-inner';
        inner.id = 'dataTableInner';

        const table = document.createElement('table');
        table.id = 'dataTable';
        const thead = document.createElement('thead');
        const hr = document.createElement('tr');
        hr.innerHTML = '<th>Row</th><th>Value</th>';
        thead.appendChild(hr);
        table.appendChild(thead);

        const tbody = document.createElement('tbody');
        rawData.forEach((val, i) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td class="row-num">${i + 1}</td><td id="cell-${i}">${val}</td>`;
            tbody.appendChild(tr);
        });
        table.appendChild(tbody);
        inner.appendChild(table);
        wrapper.appendChild(inner);
        section.appendChild(wrapper);
        displayArea.appendChild(section);
    }

    function handleReset() {
        document.getElementById('excelInput').value = "";
        document.getElementById('gapInput').value = "=1";
        rawData = [];
        document.getElementById('displayArea').innerHTML = "";
    }

    function getSharedDigits(a, b) {
        const s1 = a.toString();
        const s2 = b.toString();
        const shared = [];
        const seen = new Set();
        for (let char of s1) {
            if (s2.includes(char) && !seen.has(char)) {
                shared.push(char);
                seen.add(char);
            }
        }
        return shared;
    }

    function handleSearch() {
        const gapValue = document.getElementById('gapInput').value.trim();
        const gapMatch = gapValue.match(/^=(\d+)$/);

        if (!gapMatch) {
            alert("Please enter gap in format =1, =2, etc.");
            return;
        }

        const gap = parseInt(gapMatch[1]);
        if (gap < 1 || gap > 60) {
            alert("Gap must be between 1 and 60.");
            return;
        }

        if (rawData.length === 0) {
            handleLoad();
        }
        if (rawData.length === 0) return;

        const displayArea = document.getElementById('displayArea');
        displayArea.innerHTML = "";

        // Find all matches
        const matches = [];
        for (let i = 0; i < rawData.length; i++) {
            const targetIdx = i + gap;
            if (targetIdx >= rawData.length) break;
            const val1 = rawData[i];
            const val2 = rawData[targetIdx];
            const shared = getSharedDigits(val1, val2);
            if (shared.length > 0) {
                matches.push({ idx1: i, idx2: targetIdx, val1, val2, shared });
            }
        }

        if (matches.length === 0) {
            displayArea.innerHTML = `<div class="no-results">No patterns found for Gap = ${gap}</div>`;
            return;
        }

        // Build results section with table
        const section = document.createElement('div');
        section.className = 'results-section';

        const header = document.createElement('div');
        header.className = 'results-header';
        header.innerHTML = `<span>Pattern Results (Gap = ${gap})</span><span class="match-count">${matches.length} Matches</span>`;
        section.appendChild(header);

        // Zoom controls
        const zoomDiv = document.createElement('div');
        zoomDiv.className = 'zoom-controls';
        zoomDiv.innerHTML = `
            <button onclick="zoomOut()">−</button>
            <button onclick="zoomReset()">Reset</button>
            <button onclick="zoomIn()">+</button>
        `;
        section.appendChild(zoomDiv);

        // Table wrapper
        const wrapper = document.createElement('div');
        wrapper.className = 'table-wrapper';
        wrapper.id = 'resultsWrapper';
        const inner = document.createElement('div');
        inner.className = 'table-inner';
        inner.id = 'resultsInner';

        // Build table showing all data with highlights
        const table = document.createElement('table');
        table.id = 'resultsTable';
        const thead = document.createElement('thead');
        const hr = document.createElement('tr');
        hr.innerHTML = '<th>Row</th><th>Value</th><th>Shared</th>';
        thead.appendChild(hr);
        table.appendChild(thead);

        // Determine which rows are highlighted
        const highlightA = new Set();
        const highlightB = new Set();
        const sharedMap = {};
        matches.forEach(m => {
            highlightA.add(m.idx1);
            highlightB.add(m.idx2);
            sharedMap[m.idx1] = (sharedMap[m.idx1] || '') + m.shared.join(',');
            sharedMap[m.idx2] = (sharedMap[m.idx2] || '') + m.shared.join(',');
        });

        const tbody = document.createElement('tbody');
        rawData.forEach((val, i) => {
            const tr = document.createElement('tr');
            let cls = '';
            if (highlightA.has(i)) cls = 'highlight-a';
            else if (highlightB.has(i)) cls = 'highlight-b';
            const sharedStr = sharedMap[i] ? sharedMap[i] : '';
            tr.innerHTML = `<td class="row-num">${i + 1}</td><td class="${cls}" id="res-cell-${i}">${val}</td><td>${sharedStr}</td>`;
            tbody.appendChild(tr);
        });
        table.appendChild(tbody);
        inner.appendChild(table);
        wrapper.appendChild(inner);
        section.appendChild(wrapper);
        displayArea.appendChild(section);

        // Draw curved arrows after render
        setTimeout(() => drawCurvedArrows(matches), 200);
    }

    function drawCurvedArrows(matches) {
        const inner = document.getElementById('resultsInner');
        const table = document.getElementById('resultsTable');
        if (!inner || !table) return;

        // Remove existing SVG
        const existing = inner.querySelector('.svg-overlay');
        if (existing) existing.remove();

        const w = table.offsetWidth;
        const h = table.offsetHeight;
        const svgNS = "http://www.w3.org/2000/svg";
        const svg = document.createElementNS(svgNS, "svg");
        svg.classList.add('svg-overlay');
        svg.style.width = w + 'px';
        svg.style.height = h + 'px';
        svg.setAttribute('width', w);
        svg.setAttribute('height', h);

        // Arrowhead markers
        const defs = document.createElementNS(svgNS, 'defs');
        ARROW_COLORS.forEach((col, i) => {
            const marker = document.createElementNS(svgNS, 'marker');
            marker.setAttribute('id', 'arr-' + i);
            marker.setAttribute('markerWidth', '8');
            marker.setAttribute('markerHeight', '8');
            marker.setAttribute('refX', '6');
            marker.setAttribute('refY', '3');
            marker.setAttribute('orient', 'auto');
            marker.setAttribute('markerUnits', 'strokeWidth');
            const path = document.createElementNS(svgNS, 'path');
            path.setAttribute('d', 'M0,0 L6,3 L0,6 Z');
            path.setAttribute('fill', col);
            marker.appendChild(path);
            defs.appendChild(marker);
        });
        svg.appendChild(defs);

        const tableRect = table.getBoundingClientRect();

        matches.forEach((m, idx) => {
            const cellA = document.getElementById('res-cell-' + m.idx1);
            const cellB = document.getElementById('res-cell-' + m.idx2);
            if (!cellA || !cellB) return;

            const rA = cellA.getBoundingClientRect();
            const rB = cellB.getBoundingClientRect();

            const x1 = rA.left - tableRect.left + rA.width / 2;
            const y1 = rA.top - tableRect.top + rA.height / 2;
            const x2 = rB.left - tableRect.left + rB.width / 2;
            const y2 = rB.top - tableRect.top + rB.height / 2;

            // Curved arrow (bezier) - bend to the right
            const dx = x2 - x1;
            const dy = y2 - y1;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const bend = Math.min(100, Math.max(40, dist * 0.4));
            const mx = (x1 + x2) / 2;
            const my = (y1 + y2) / 2;
            const px = -dy / (dist || 1);
            const py = dx / (dist || 1);
            const cx = mx + px * bend;
            const cy = my + py * bend;

            const colorIdx = idx % ARROW_COLORS.length;
            const path = document.createElementNS(svgNS, 'path');
            path.setAttribute('d', `M ${x1} ${y1} Q ${cx} ${cy} ${x2} ${y2}`);
            path.setAttribute('fill', 'none');
            path.setAttribute('stroke', ARROW_COLORS[colorIdx]);
            path.setAttribute('stroke-width', '2.5');
            path.setAttribute('stroke-opacity', '0.85');
            path.setAttribute('stroke-linecap', 'round');
            path.setAttribute('marker-end', `url(#arr-${colorIdx})`);
            svg.appendChild(path);
        });

        inner.appendChild(svg);
    }

    function zoomIn() {
        zoomLevel = Math.min(3, zoomLevel + 0.15);
        applyZoom();
    }
    function zoomOut() {
        zoomLevel = Math.max(0.3, zoomLevel - 0.15);
        applyZoom();
    }
    function zoomReset() {
        zoomLevel = 1;
        applyZoom();
    }
    function applyZoom() {
        const inner = document.getElementById('resultsInner');
        if (inner) inner.style.transform = `scale(${zoomLevel})`;
    }

    // Support Enter key
    document.getElementById('gapInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') handleSearch();
    });

    // Ctrl+Scroll zoom
    document.addEventListener('wheel', (e) => {
        if (e.ctrlKey) {
            e.preventDefault();
            const delta = e.deltaY > 0 ? -0.05 : 0.05;
            zoomLevel = Math.max(0.3, Math.min(3, zoomLevel + delta));
            applyZoom();
        }
    }, { passive: false });
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>

</body>
</html>
